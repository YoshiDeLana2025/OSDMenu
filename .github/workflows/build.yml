name: Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container: ghcr.io/ps2homebrew/ps2homebrew@sha256:106ad024016ef0776cbfd99b27fb30c849de62fe374653680fd7a0f19245e078
    steps:
    - name: Install cmake
      run: |
        apk add cmake

    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Fetch full clone
      run: |
        git config --global --add safe.directory "$GITHUB_WORKSPACE"
        git fetch --prune --unshallow

    - name: Compile project
      id: make
      env:
          KELFSERVER_API_ADDRESS: ${{ secrets.KELFSERVER_API_ADDRESS }}
          KELFSERVER_API_KEY: ${{ secrets.KELFSERVER_API_KEY }}
      run: |
        cmake -B build -DRELEASE=ON
        cmake --build build

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      if: steps.make.outcome == 'success'
      with:
        name: artifacts
        path: |
          build/release/**
